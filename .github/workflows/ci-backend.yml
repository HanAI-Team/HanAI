on:
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: backend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - "backend/**"

      - uses: astral-sh/setup-uv@v3
        if: steps.changes.outputs.backend == 'true'
      - name: Install dependencies
        if: steps.changes.outputs.backend == 'true'
        run: cd backend && uv sync --dev
      - name: Run pytest
        if: steps.changes.outputs.backend == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          CLOVA_CLIENT_ID: ${{ secrets.CLOVA_CLIENT_ID }}
          CLOVA_CLIENT_SECRET: ${{ secrets.CLOVA_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          RRN_ENCRYPTION_KEY: ${{ secrets.RRN_ENCRYPTION_KEY }}

        run: cd backend && source .venv/bin/activate && pytest tests/ -v
