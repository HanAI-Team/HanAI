on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: cd backend && uv sync --dev
      - name: Run pytest
        run: cd backend && uv run pytest tests/ -v
